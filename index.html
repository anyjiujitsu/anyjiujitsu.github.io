<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UNDEFINED</title>

  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/pills.css?v=20260129-302">
  <link rel="stylesheet" href="assets/css/components.css?v=20260212-902" />
  <link rel="stylesheet" href="assets/css/directory.css?v=20260210-809" />
<!-- IMPORTANT: repo references main.js (no sequence) -->
  <script type="module" src="assets/js/main.js?v=20260427-eventszip-directapply"></script>
</head>

<body>
  <div class="app" id="app">

    <!-- Header Area -->
    <header class="header" id="header">
      
      <!-- Logo Area (above header) -->
    <div aria-label="ANY logo" class="siteLogoRow">
      <div class="header__inner siteHeaderInner--logo">
        <div class="header__logoCrop"><img class="header__logoImage" src="logo.png" alt="ANY" /></div>
      </div>
    </div>

      <div class="header__inner siteHeaderInner--title">
        <h1 class="header__title" id="viewTitle" aria-label="Current view">EVENTS</h1>

        <div class="header__countWrap" id="headerCounts" aria-live="polite">
          <span id="eventsStatus" class="status header__count">Loading</span>
          <span id="status" class="status header__count" hidden></span>
        </div>

        <!-- Header social links -->
        <div class="headerSocial" aria-label="Header social links">
          <a class="headerSocial__link" data-customization-link="github" href="#" target="_blank" rel="noopener" aria-label="GitHub repository">
            <!-- GitHub (Feather-style) -->
            <svg class="headerSocial__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M9 19c-5 1.5-5-2.5-7-3"></path>
              <path d="M15 22v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 19 4.77 5.07 5.07 0 0 0 18.91 1S17.73.65 15 2.48a13.38 13.38 0 0 0-7 0C5.27.65 4.09 1 4.09 1A5.07 5.07 0 0 0 4 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 8 18.13V22"></path>
            </svg>
          </a>

          <a class="headerSocial__link" data-customization-link="instagram" href="#" target="_blank" rel="noopener" aria-label="Instagram profile">
            <!-- Instagram (Feather-style) -->
            <svg class="headerSocial__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <rect x="2.5" y="2.5" width="19" height="19" rx="5" ry="5"></rect>
              <path d="M16 11.37a4 4 0 1 1-1.1-2.75A4 4 0 0 1 16 11.37z"></path>
              <circle cx="17.5" cy="6.5" r="0.5"></circle>
            </svg>
          </a>

          <a class="headerSocial__link" data-customization-link="contact" href="#" target="_blank" rel="noopener" aria-label="Instagram DM">
            <!-- DM (paper plane / send) -->
            <svg class="headerSocial__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </a>
        </div>
        <!-- End header social links -->

        <!-- Toggle: LEFT = EVENTS, RIGHT = INDEX [TESTING HOLD] -->
        <div class="viewToggle" id="viewToggle" role="tablist" aria-label="View toggle">
          <button class="viewToggle__tab" id="tabEvents" role="tab" aria-selected="true" type="button">Events</button>
          <button class="viewToggle__tab" id="tabIndex" role="tab" aria-selected="false" type="button">Index</button>
          <div class="viewToggle__thumb" aria-hidden="true"></div>
        </div>
      </div>

    <!-- Sticky Filter Bars (locked with header) -->
    <div class="stickyFilters" id="stickyFilters">
      <nav class="filters" id="eventsFilters" aria-label="Events filters">
            <div class="filters__inner">
              <!-- Natural language search -->
              <div class="suggestWrap" id="eventsSearchWrap">

              <div class="pill pill--search">
                <span class="pill__icon" aria-hidden="true">🔎</span>
                <input id="eventsSearchInput" class="pill__input" type="text" inputmode="search"
                       autocomplete="off" autocapitalize="none" spellcheck="false"
                       placeholder="Search events" />
                <button id="eventsSearchClear" class="pill__clear" type="button" aria-label="Clear">×</button>
              </div>
              <div id="eventsSearchSuggest" class="suggest" hidden>

                <!-- EVENTS mode: Quick Searches -->
                <div id="eventsSearchSuggestQuick">
                  <div class="menu__header menu__header--static">
                    <span class="menu__title">Quick Searches</span>
                  </div>
                  <div class="menu__divider"></div>
                  <button type="button" class="suggest__item" data-value="THIS WEEKEND">THIS WEEKEND</button>
                  <button type="button" class="suggest__item" data-value="NEXT WEEKEND">NEXT WEEKEND</button>
                  <button type="button" class="suggest__item" data-value="2026, COMP">2026, COMP</button>
                  <button type="button" class="suggest__item" data-value="NEW EVENTS">NEW EVENTS</button>
                </div>

                <!-- EVENTS mode: Events Near -->
                <div id="eventsSearchSuggestEventsDistance">
                  <div class="menu__header menu__header--static">
                    <span class="menu__title">EVENTS NEAR</span>
                  </div>
                  <div class="menu__divider"></div>

                  <div class="distance__section" aria-label="Events near ZIP">
                    <div class="distance__row">
                      <input id="eventsDistanceOriginInput" class="distance__input" type="text"
                             inputmode="numeric" autocomplete="off" autocapitalize="none" spellcheck="false"
                             placeholder="Enter ZIP" maxlength="5" aria-label="Enter ZIP" />
                      <button id="eventsDistanceApplyBtn" class="distance__apply" type="button" aria-label="Apply event ZIP">
                        ➜
                      </button>
                    </div>

                    <div id="eventsDistanceHint" class="distance__hint distance__hint--toggle" aria-label="Event distance filter">
                      <span class="distance__hintText">Distance(mi.)</span>
                      <div class="iosSeg" data-selected="15" role="group" aria-label="Event distance (miles)">
                        <button type="button" class="iosSeg__btn is-active" data-miles="15" aria-pressed="true">15</button>
                        <button type="button" class="iosSeg__btn" data-miles="30" aria-pressed="false">30</button>
                      </div>
                      <span class="distance__hintText"></span>
                    </div>
                  </div>
                </div>

                <!-- INDEX mode: Training Near -->
                <div id="eventsSearchSuggestDistance" hidden>
                  <div class="menu__header menu__header--static">
                    <span class="menu__title">TRAINING NEAR</span>
                  </div>
                  <div class="menu__divider"></div>

                  <div class="distance__section" aria-label="Training near ZIP">
                    <div class="distance__row">
                      <input id="distanceOriginInput" class="distance__input" type="text"
                             inputmode="numeric" autocomplete="off" autocapitalize="none" spellcheck="false"
                             placeholder="Enter ZIP" maxlength="5" aria-label="Enter ZIP" />
                      <button id="distanceApplyBtn" class="distance__apply" type="button" aria-label="Apply ZIP">
                        ➜
                      </button>
                    </div>
                    
                    <div id="distanceHint" class="distance__hint distance__hint--toggle" aria-label="Distance filter">
                      <span class="distance__hintText">Distance(mi.)</span>
                      <div class="iosSeg" data-selected="15" role="group" aria-label="Distance (miles)">
                        <button type="button" class="iosSeg__btn is-active" data-miles="15" aria-pressed="true">15</button>
                        <button type="button" class="iosSeg__btn" data-miles="30" aria-pressed="false">30</button>
                      </div>
                      <span class="distance__hintText"></span>
                    </div>
                  </div>
                </div>


              </div>
              </div>

              <!-- Pill 1: YEAR -->
              <div class="pillSelect" data-filter="eventsYear">
                <button id="eventsPill1Btn" class="pill pill--select filter-pill" data-pill="eventsYear" type="button" aria-haspopup="menu" aria-expanded="false">
                  <span class="pill__label" data-pill-title>YEAR</span>
                  <span class="pill__dot" id="eventsPill1Dot" data-pill-indicator aria-hidden="true"></span>
                  <span class="pill__caret" aria-hidden="true">▾</span>
                </button>
                <div id="eventsPill1Menu" class="menu" data-pill-panel role="menu" aria-label="Year menu" hidden>
                  <div class="menu__header">
                    <div class="menu__title">YEAR</div>
                    <button id="eventsPill1Clear" class="menu__clear" data-pill-clear type="button">Clear</button>
                  </div>
</div>
              </div>

              <!-- Pill 2: STATE -->
              <div class="pillSelect" data-filter="eventsState">
                <button id="eventsPill2Btn" class="pill pill--select filter-pill" data-pill="eventsState" type="button" aria-haspopup="menu" aria-expanded="false">
                  <span class="pill__label" data-pill-title>STATE</span>
                  <span class="pill__dot" id="eventsPill2Dot" data-pill-indicator aria-hidden="true"></span>
                  <span class="pill__caret" aria-hidden="true">▾</span>
                </button>
                <div id="eventsPill2Menu" class="menu" data-pill-panel role="menu" aria-label="State menu" hidden>
                  <div class="menu__header">
                    <div class="menu__title">STATE</div>
                    <button id="eventsPill2Clear" class="menu__clear" data-pill-clear type="button">Clear</button>
                  </div>
</div>
              </div>

              <!-- Pill 3: EVENT -->
              <div class="pillSelect" data-filter="eventsType">
                <button id="eventsPill3Btn" class="pill pill--select filter-pill" data-pill="eventsType" type="button" aria-haspopup="menu" aria-expanded="false">
                  <span class="pill__label" data-pill-title>EVENT</span>
                  <span class="pill__dot" id="eventsPill3Dot" data-pill-indicator aria-hidden="true"></span>
                  <span class="pill__caret" aria-hidden="true">▾</span>
                </button>
                <div id="eventsPill3Menu" class="menu" data-pill-panel role="menu" aria-label="Event menu" hidden>
                  <div class="menu__header">
                    <div class="menu__title">EVENT</div>
                    <button id="eventsPill3Clear" class="menu__clear" data-pill-clear type="button">Clear</button>
                  </div>
</div>
              </div>
            </div>
          </nav>
      <nav class="filters" id="filters" hidden aria-label="Filters">
            <div class="filters__inner">
              <!-- Natural language search -->
              <div class="pill pill--search">
                <span class="pill__icon" aria-hidden="true">🔎</span>
                <input
                  id="searchInput"
                  class="pill__input"
                  type="text"
                  inputmode="search"
                  autocomplete="off"
                  autocapitalize="none"
                  spellcheck="false"
                  placeholder="Search gyms"
                />
                <button id="searchClear" class="pill__clear" type="button" aria-label="Clear search">×</button>
              </div>

              <!-- Pill 1: State -->
              <div class="pillSelect" data-filter="state">
                <button id="stateBtn" class="pill pill--select filter-pill" data-pill="states" type="button" aria-haspopup="menu" aria-expanded="false">
                  <span class="pill__label" id="stateLabel" data-pill-title>STATE</span>
                  <span class="pill__dot" id="stateDot" data-pill-indicator aria-hidden="true"></span>
                  <span class="pill__caret" aria-hidden="true">▾</span>
                </button>

                <div id="stateMenu" class="menu" data-pill-panel role="menu" aria-label="State menu" hidden>
                  <div class="menu__header">
                    <div class="menu__title">STATE</div>
                    <button id="stateClear" class="menu__clear" data-pill-clear type="button">Clear</button>
                  </div>
                  <div id="stateList" class="menu__list"></div>
                </div>
              </div>

              <!-- Pill 2: Open Mat -->
              <div class="pillSelect" data-filter="openMat">
                <button id="openMatBtn" class="pill pill--select filter-pill" data-pill="openMat" type="button" aria-haspopup="menu" aria-expanded="false">
                  <span class="pill__label" id="openMatLabel" data-pill-title>OPENS</span>
                  <span class="pill__dot" id="openMatDot" data-pill-indicator aria-hidden="true"></span>
                  <span class="pill__caret" aria-hidden="true">▾</span>
                </button>

                <div id="openMatMenu" class="menu" data-pill-panel role="menu" aria-label="Open Mat menu" hidden>
                  <div class="menu__header">
                    <div class="menu__title">OPENS</div>
                    <button id="openMatClear" class="menu__clear" data-pill-clear type="button">Clear</button>
                  </div>
                  <div class="menu__list" id="openMatList">
                    <label class="menu__item">
                      <input type="checkbox" name="openMat" value="all" />
                      <span>All</span>
                    </label>
                    <label class="menu__item">
                      <input type="checkbox" name="openMat" value="sat" />
                      <span>Saturday</span>
                    </label>
                    <label class="menu__item">
                      <input type="checkbox" name="openMat" value="sun" />
                      <span>Sunday</span>
                    </label>
                  </div>
                </div>
              </div>

              <!-- Pill 3: Guests -->
              <div class="pillSelect" data-filter="guests">
                <button id="guestsBtn" class="pill pill--select filter-pill" data-pill="guests" type="button" aria-haspopup="menu" aria-expanded="false">
                  <span class="pill__label" id="guestsLabel" data-pill-title>GUESTS</span>
                  <span class="pill__dot" id="guestsDot" data-pill-indicator aria-hidden="true"></span>
                  <span class="pill__caret" aria-hidden="true">▾</span>
                </button>

                <div id="guestsMenu" class="menu" data-pill-panel role="menu" aria-label="Guests menu" hidden>
                  <div class="menu__header">
                    <div class="menu__title">GUESTS</div>
                    <button id="guestsClear" class="menu__clear" data-pill-clear type="button">Clear</button>
                  </div>
                  <div class="menu__list" id="guestsList">
                    <label class="menu__item">
                      <input type="checkbox" name="guests" value="GUESTS WELCOME" />
                      <span>GUESTS WELCOME</span>
                    </label>
                  </div>
                </div>
              </div>

            </div>
          </nav>
    </div>

</header>

    <div class="viewShell" id="viewShell">
      <div class="viewSlider" id="viewSlider">

        <!-- VIEW A: EVENTS (LEFT / FIRST) -->
        <div class="viewPanel" id="viewEvents" aria-label="Events">
<main class="content" aria-label="Events">
            <div class="content__inner">
<div id="eventsRoot"></div>
            </div>
          </main>
        </div>

        <!-- VIEW B: INDEX (RIGHT / SECOND) -->
        <div class="viewPanel" id="viewIndex" aria-label="Index">
<main class="content" id="content" aria-label="Directory">
            <div class="content__inner">
<div id="indexEventsRoot"></div>
            </div>
          </main>
        </div>

      </div>
    </div>

  </div>
</body>
</html>
